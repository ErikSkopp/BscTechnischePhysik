# Hugo configuration file
title: Technische Physik


# import hextra as module
module:
  imports:
  - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: About
      pageRef: /about
      weight: 2
    - name: Contact ↗
      url: "https://github.com/ErikSkopp"
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/ErikSkopp/TechnischePhysik"
      params:
        icon: github
    - name: Twitter
      weight: 6
      url: "https://twitter.com/erikskopp"
      params:
        icon: x-twitter

params:
  navbar:
    displayTitle: true
    displayLogo: true

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/ErikSkopp/TechnischePhysik/edit/main/content"

services:
  googleAnalytics:
    ID: G-T2SP8DXN7Q 
